name: TMAS Scan — Java (Log4Shell Demo)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-scan:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        working-directory: trendai-demo-java
        run: mvn clean package -DskipTests --no-transfer-progress

      - name: Download and Install TMAS CLI
        run: |
          curl -L "https://ast-cli.xdr.trendmicro.com/tmas-cli/2.252.0/tmas-cli_Linux_x86_64.tar.gz" | tar xz
          sudo mv tmas /usr/local/bin/
          tmas --version

      - name: Run TMAS Scan
        env:
          TMAS_API_KEY: ${{ secrets.TMAS_API_KEY }}
          TMAS_REGION: ${{ secrets.VISION_ONE_REGION }}
        run: |
          tmas scan artifact dir:trendai-demo-java \
            --vulnerabilities --malware --secrets \
            --region "$TMAS_REGION"
