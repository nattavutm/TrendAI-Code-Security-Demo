name: TMAS Scan — Java (Log4Shell Demo)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  build-and-scan:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        working-directory: trendai-demo-java
        run: mvn clean package -DskipTests --no-transfer-progress

      - name: TMAS Scan — vulnerabilities, secrets, malware
        uses: trendmicro/tmas-scan-action@v3
        with:
          version: '3'
          vulnerabilitiesScan: true
          secretsScan: true
          malwareScan: true
          artifact: dir:trendai-demo-java
          additionalArgs: --region=${{ secrets.VISION_ONE_REGION }}
          tmasApiKey: ${{ secrets.TMAS_API_KEY }}
          githubToken: ${{ secrets.GITHUB_TOKEN }}
