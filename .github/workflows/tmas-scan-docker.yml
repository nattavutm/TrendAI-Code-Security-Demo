name: TMAS Scan — Docker (Image Secrets + Malware Pattern Demo)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  scan-source:
    name: Scan source (secrets + malware)
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: TMAS Scan — secrets and malware in source
        uses: trendmicro/tmas-scan-action@v3.1.3
        with:
          version: '3'
          vulnerabilitiesScan: true
          secretsScan: true
          malwareScan: true
          artifact: dir:trendai-demo-docker
          additionalArgs: --region=${{ secrets.VISION_ONE_REGION }}
          tmasApiKey: ${{ secrets.TMAS_API_KEY }}
          githubToken: ${{ secrets.GITHUB_TOKEN }}

  scan-image:
    name: Scan Docker image (OS CVEs + baked secrets)
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        working-directory: trendai-demo-docker
        run: docker build -t trendai-demo-docker:${{ github.sha }} .

      - name: TMAS Scan — container image
        uses: trendmicro/tmas-scan-action@v3.1.3
        with:
          version: '3'
          vulnerabilitiesScan: true
          secretsScan: true
          malwareScan: true
          artifact: image:trendai-demo-docker:${{ github.sha }}
          additionalArgs: --region=${{ secrets.VISION_ONE_REGION }}
          tmasApiKey: ${{ secrets.TMAS_API_KEY }}
          githubToken: ${{ secrets.GITHUB_TOKEN }}
