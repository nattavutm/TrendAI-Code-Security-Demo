name: TMAS Scan — Docker (Image Secrets + Malware Pattern Demo)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  scan-source:
    name: Scan source (secrets + malware)
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download and Install TMAS CLI
        run: |
          curl -L "https://ast-cli.xdr.trendmicro.com/tmas-cli/2.252.0/tmas-cli_Linux_x86_64.tar.gz" | tar xz
          sudo mv tmas /usr/local/bin/
          tmas --version

      - name: Run TMAS Scan on Source
        env:
          TMAS_API_KEY: ${{ secrets.TMAS_API_KEY }}
          TMAS_REGION: ${{ secrets.VISION_ONE_REGION }}
        run: |
          tmas scan artifact dir:trendai-demo-docker \
            --region "$TMAS_REGION"

  scan-image:
    name: Scan Docker image (OS CVEs + baked secrets)
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        working-directory: trendai-demo-docker
        run: docker build -t trendai-demo-docker:${{ github.sha }} .

      - name: Download and Install TMAS CLI
        run: |
          curl -L "https://ast-cli.xdr.trendmicro.com/tmas-cli/2.252.0/tmas-cli_Linux_x86_64.tar.gz" | tar xz
          sudo mv tmas /usr/local/bin/
          tmas --version

      - name: Run TMAS Scan on Container Image
        env:
          TMAS_API_KEY: ${{ secrets.TMAS_API_KEY }}
          TMAS_REGION: ${{ secrets.VISION_ONE_REGION }}
        run: |
          tmas scan artifact image:trendai-demo-docker:${{ github.sha }} \
            --region "$TMAS_REGION"
