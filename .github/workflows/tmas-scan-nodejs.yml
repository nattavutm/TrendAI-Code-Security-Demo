name: TMAS Scan — Node.js (Deserialization + Prototype Pollution Demo)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  scan:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: TMAS Scan — vulnerabilities, secrets, malware
        uses: trendmicro/tmas-scan-action@v3
        with:
          version: '3'
          vulnerabilitiesScan: true
          secretsScan: true
          malwareScan: true
          artifact: dir:trendai-demo-nodejs
          additionalArgs: --region=${{ secrets.VISION_ONE_REGION }}
          tmasApiKey: ${{ secrets.TMAS_API_KEY }}
          githubToken: ${{ secrets.GITHUB_TOKEN }}
