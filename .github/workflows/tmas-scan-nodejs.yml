name: TMAS Scan — Node.js (Deserialization + Prototype Pollution Demo)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download and Install TMAS CLI
        run: |
          curl -L "https://ast-cli.xdr.trendmicro.com/tmas-cli/2.252.0/tmas-cli_Linux_x86_64.tar.gz" | tar xz
          sudo mv tmas /usr/local/bin/
          tmas --version

      - name: Run TMAS Scan
        env:
          TMAS_API_KEY: ${{ secrets.TMAS_API_KEY }}
          TMAS_REGION: ${{ secrets.VISION_ONE_REGION }}
        run: |
          tmas scan artifact trendai-demo-nodejs \
            --vulnerabilities --malware --secrets \
            --region "$TMAS_REGION"
